<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ex Plo Rer Birthday Quiz 🎉</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎉 Ex Plo Rer Birthday Quiz 🎉</h1>
    <form id="quizForm">
        <div class="question">
            <label>1. What is my third name?</label>
            <input type="text" name="q1" required>
        </div>
        <div class="question">
            <label>2. My girlfriend’s name?</label>
            <input type="text" name="q2" required>
        </div>
        <div class="question">
            <label>3. What is my best friend’s name?</label>
            <input type="text" name="q3" required>
        </div>
        <div class="question">
            <label>4. My favorite musician?</label>
            <input type="text" name="q4" required>
        </div>
        <div class="question">
            <label>5. What year did I turn today?</label>
            <input type="text" name="q5" required>
        </div>
        <button type="submit">Submit</button>
    </form>

    <div id="alreadyTaken" class="already-taken">
        You have already taken the quiz! 🎉
    </div>
</div>

<!-- Winner popup -->
<div id="winnerPopup" class="popup">
    <div class="popup-content">
        <h2>🎉 Perfect Score! 🎉</h2>
        <p>Congrats! You got 5/5 🏆</p>
        <p>Send me a DM to claim your birthday reward! 💰</p>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<!-- Loser popup -->
<div id="loserPopup" class="popup">
    <div class="popup-content">
        <h2>😢 Sorry!</h2>
        <p>You didn’t get a perfect score this time.</p>
        <p>Don’t worry, keep trying or just DM me to celebrate my birthday! 🎂</p>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
